<!DOCTYPE html>
<html lang="en" class="theme-classic is-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/theme-classic.css" />
  <link rel="stylesheet" href="./css/theme-aurora.css" />
  <link rel="stylesheet" href="./css/theme-apothecary.css" />
  <title>DoseGrid</title>
</head>
<body>
  <header class="app-header">
    <h1>DoseGrid</h1>
    <div class="view-toggle" role="tablist" aria-label="View">
      <button id="tab-home" class="active">Home</button>
      <button id="tab-timeline">Timeline</button>
    </div>
    <button id="about-btn" class="icon-btn" aria-label="About / How it works">?</button>
  </header>

  <main>
    <section id="home-view" aria-label="Home">
      <div id="home-pain"></div>
      <div id="grid" class="grid" aria-label="Medication grid"></div>
    </section>
    <section id="timeline-view" aria-label="Timeline" hidden></section>
  </main>

  <!-- Dialog host; ui.js renders content into this -->
  <div id="modal-root"></div>

  <p class="disclaimer">Personal logging tool — not medical advice. You set all timings.</p>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
